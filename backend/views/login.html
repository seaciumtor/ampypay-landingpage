<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login — AmpyPay</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:      #0A1F44;
      --navy-deep: #071737;
      --navy-mid:  #0D2550;
      --blue:      #2563EA;
      --blue-hov:  #1d4ed8;
      --cream:     #FBFBEE;
      --muted:     rgba(251,251,238,0.55);
      --border:    rgba(255,255,255,0.10);
    }

    html, body { height: 100%; font-family: 'Inter', system-ui, sans-serif; background-color: var(--navy-deep); color: var(--cream); }

    body::before {
      content: ''; position: fixed; inset: 0; pointer-events: none;
      background-image: linear-gradient(rgba(37,99,234,0.06) 1px, transparent 1px), linear-gradient(90deg, rgba(37,99,234,0.06) 1px, transparent 1px);
      background-size: 48px 48px;
    }
    body::after {
      content: ''; position: fixed; top: -20%; left: 50%; transform: translateX(-50%);
      width: 680px; height: 480px; pointer-events: none;
      background: radial-gradient(ellipse at center, rgba(37,99,234,0.18) 0%, transparent 70%);
    }

    .page { position: relative; z-index: 1; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; }

    .card {
      width: 100%; max-width: 400px;
      background: rgba(13,37,80,0.7);
      border: 1px solid var(--border);
      border-radius: 20px; padding: 48px 40px 40px;
      backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      box-shadow: 0 0 0 1px rgba(37,99,234,0.12), 0 24px 64px rgba(0,0,0,0.45);
      overflow: hidden;
    }

    /* ── Logo ── */
    .logo { display: flex; align-items: center; gap: 10px; justify-content: center; margin-bottom: 32px; }
    .logo-icon { width: 40px; height: 40px; flex-shrink: 0; }
    .logo-text { font-size: 24px; font-weight: 700; letter-spacing: -0.5px; color: var(--cream); }
    .logo-text span { color: var(--blue); }

    /* ── Steps container ── */
    .steps-wrap { position: relative; width: 100%; }
    .step { width: 100%; transition: opacity 0.28s ease, transform 0.28s ease; }
    .step.hidden { display: none; }

    /* ── Step indicator ── */
    .step-indicator {
      display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 28px;
    }
    .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: rgba(255,255,255,0.18); transition: background 0.2s;
    }
    .dot.active { background: var(--blue); }
    .dot.done { background: rgba(37,99,234,0.45); }

    /* ── Headings ── */
    .step-title { font-size: 17px; font-weight: 600; text-align: center; margin-bottom: 5px; }
    .step-sub { font-size: 13px; color: var(--muted); text-align: center; margin-bottom: 28px; line-height: 1.5; }

    /* ── Error banner ── */
    .error-banner {
      background: rgba(239,68,68,0.12); border: 1px solid rgba(239,68,68,0.25);
      border-radius: 8px; padding: 10px 14px; font-size: 13px; color: #fca5a5;
      margin-bottom: 20px; display: none;
    }
    .error-banner.visible { display: block; }

    /* ── Form fields ── */
    .form-group { margin-bottom: 16px; }
    label { display: block; font-size: 12px; font-weight: 500; letter-spacing: 0.04em; text-transform: uppercase; color: var(--muted); margin-bottom: 7px; }

    input[type="text"], input[type="password"] {
      width: 100%; padding: 11px 14px;
      background: rgba(255,255,255,0.06); border: 1px solid var(--border);
      border-radius: 10px; color: var(--cream); font-family: inherit; font-size: 14px;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s; outline: none;
    }
    input::placeholder { color: rgba(251,251,238,0.28); }
    input:focus { border-color: rgba(37,99,234,0.6); background: rgba(255,255,255,0.09); box-shadow: 0 0 0 3px rgba(37,99,234,0.18); }
    input:-webkit-autofill, input:-webkit-autofill:focus {
      -webkit-text-fill-color: var(--cream);
      -webkit-box-shadow: 0 0 0 1000px #0d2550 inset;
      transition: background-color 5000s ease-in-out 0s;
    }

    /* ── TOTP input ── */
    .totp-input-wrap { display: flex; gap: 8px; justify-content: center; margin-bottom: 24px; }
    .totp-digit {
      width: 44px; height: 54px; text-align: center;
      background: rgba(255,255,255,0.06); border: 1px solid var(--border);
      border-radius: 10px; color: var(--cream); font-family: inherit;
      font-size: 22px; font-weight: 600;
      transition: border-color 0.2s, box-shadow 0.2s; outline: none;
      caret-color: transparent;
    }
    .totp-digit:focus { border-color: rgba(37,99,234,0.6); box-shadow: 0 0 0 3px rgba(37,99,234,0.18); background: rgba(255,255,255,0.09); }
    .totp-digit.filled { border-color: rgba(37,99,234,0.4); }

    /* Hidden full totp value for form submit */
    #totpValue { display: none; }

    /* ── Buttons ── */
    .btn {
      width: 100%; padding: 12px; margin-top: 4px;
      background: var(--blue); border: none; border-radius: 10px;
      color: #fff; font-family: inherit; font-size: 15px; font-weight: 600;
      cursor: pointer; transition: background 0.18s, transform 0.12s, box-shadow 0.18s;
      box-shadow: 0 4px 18px rgba(37,99,234,0.35);
    }
    .btn:hover { background: var(--blue-hov); box-shadow: 0 6px 24px rgba(37,99,234,0.5); }
    .btn:active { transform: scale(0.985); }

    .btn-back {
      display: flex; align-items: center; gap: 6px; justify-content: center;
      background: none; border: none; color: var(--muted); font-family: inherit;
      font-size: 13px; cursor: pointer; padding: 10px; width: 100%; margin-top: 8px;
      border-radius: 8px; transition: color 0.18s;
    }
    .btn-back:hover { color: var(--cream); }

    .card-foot { margin-top: 28px; font-size: 11.5px; text-align: center; color: rgba(251,251,238,0.28); }
  </style>
</head>
<body>
<div class="page">
  <div class="card">

    <div class="logo">
      <svg class="logo-icon" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path d="M20 3L5 9.5V20c0 7.18 6.4 13.88 15 16 8.6-2.12 15-8.82 15-16V9.5L20 3Z" fill="#2563EA" fill-opacity="0.15" stroke="#2563EA" stroke-width="1.5"/>
        <path d="M22 10l-6 11h5l-3 9 8-13h-5l4-7h-3Z" fill="#2563EA"/>
      </svg>
      <span class="logo-text">Ampy<span>Pay</span></span>
    </div>

    <!-- Step indicator -->
    <div class="step-indicator">
      <div class="dot active" id="dot1"></div>
      <div class="dot" id="dot2"></div>
    </div>

    <form method="POST" action="/ap-control/login" id="loginForm">
      <input type="hidden" name="username" id="hiddenUsername" />
      <input type="hidden" name="password" id="hiddenPassword" />
      <input type="hidden" name="totp"     id="totpValue" />

      <!-- ── Step 1: Username + Password ── -->
      <div class="step" id="step1">
        <h1 class="step-title">Admin Portal</h1>
        <p class="step-sub">Sign in to access the dashboard</p>

        <div class="error-banner" id="errCredentials">
          Incorrect username or password.
        </div>

        <div class="form-group">
          <label for="username">Username</label>
          <input id="username" type="text" placeholder="Enter username" autocomplete="username" required autofocus />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input id="password" type="password" placeholder="Enter password" autocomplete="current-password" required />
        </div>
        <button class="btn" type="button" id="btnNext">Continue →</button>
      </div>

      <!-- ── Step 2: TOTP ── -->
      <div class="step hidden" id="step2">
        <h1 class="step-title">Two-Factor Auth</h1>
        <p class="step-sub">Open <strong>Google Authenticator</strong><br>and enter the 6-digit code</p>

        <div class="error-banner" id="errTotp">
          Invalid authenticator code. Please try again.
        </div>

        <div class="totp-input-wrap" id="totpBoxes">
          <input class="totp-digit" type="text" inputmode="numeric" maxlength="1" />
          <input class="totp-digit" type="text" inputmode="numeric" maxlength="1" />
          <input class="totp-digit" type="text" inputmode="numeric" maxlength="1" />
          <input class="totp-digit" type="text" inputmode="numeric" maxlength="1" />
          <input class="totp-digit" type="text" inputmode="numeric" maxlength="1" />
          <input class="totp-digit" type="text" inputmode="numeric" maxlength="1" />
        </div>

        <button class="btn" type="submit" id="btnSubmit" disabled>Verify & Sign In</button>
        <button class="btn-back" type="button" id="btnBack">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
          Back
        </button>
      </div>
    </form>

    <p class="card-foot">AmpyPay &copy; 2024 &nbsp;&middot;&nbsp; Admin access only</p>
  </div>
</div>

<script>
  const params = new URLSearchParams(location.search);
  const errorType = params.get('error');

  const step1 = document.getElementById('step1');
  const step2 = document.getElementById('step2');
  const dot1  = document.getElementById('dot1');
  const dot2  = document.getElementById('dot2');

  // Show appropriate error from server response
  if (errorType === 'credentials') {
    document.getElementById('errCredentials').classList.add('visible');
  } else if (errorType === 'totp') {
    // Jump straight to step 2 with error
    showStep2();
    document.getElementById('errTotp').classList.add('visible');
  }

  // ── Step navigation ──
  document.getElementById('btnNext').addEventListener('click', () => {
    const u = document.getElementById('username').value.trim();
    const p = document.getElementById('password').value;
    if (!u || !p) {
      document.getElementById('username').focus();
      return;
    }
    document.getElementById('hiddenUsername').value = u;
    document.getElementById('hiddenPassword').value = p;
    showStep2();
  });

  document.getElementById('btnBack').addEventListener('click', () => {
    step2.classList.add('hidden');
    step1.classList.remove('hidden');
    dot1.classList.add('active');
    dot1.classList.remove('done');
    dot2.classList.remove('active');
    clearDigits();
  });

  function showStep2() {
    step1.classList.add('hidden');
    step2.classList.remove('hidden');
    dot1.classList.remove('active');
    dot1.classList.add('done');
    dot2.classList.add('active');
    setTimeout(() => {
      const digits = document.querySelectorAll('.totp-digit');
      digits[0].focus();
    }, 50);
  }

  // ── TOTP digit boxes ──
  const digits = document.querySelectorAll('.totp-digit');
  const submitBtn = document.getElementById('btnSubmit');

  digits.forEach((el, i) => {
    el.addEventListener('input', (e) => {
      const val = e.target.value.replace(/\D/g, '');
      e.target.value = val.slice(-1);
      if (val && i < digits.length - 1) digits[i + 1].focus();
      updateTotpValue();
    });

    el.addEventListener('keydown', (e) => {
      if (e.key === 'Backspace' && !e.target.value && i > 0) {
        digits[i - 1].focus();
        digits[i - 1].value = '';
        updateTotpValue();
      }
      if (e.key === 'ArrowLeft' && i > 0) digits[i - 1].focus();
      if (e.key === 'ArrowRight' && i < digits.length - 1) digits[i + 1].focus();
    });

    // Handle paste of full 6-digit code
    el.addEventListener('paste', (e) => {
      e.preventDefault();
      const pasted = (e.clipboardData.getData('text') || '').replace(/\D/g, '').slice(0, 6);
      pasted.split('').forEach((ch, j) => { if (digits[j]) digits[j].value = ch; });
      if (pasted.length < 6) digits[pasted.length]?.focus();
      else digits[5].focus();
      updateTotpValue();
    });
  });

  function updateTotpValue() {
    const code = [...digits].map(d => d.value).join('');
    document.getElementById('totpValue').value = code;
    submitBtn.disabled = code.length < 6;
    digits.forEach((d, i) => d.classList.toggle('filled', !!d.value));
  }

  function clearDigits() {
    digits.forEach(d => { d.value = ''; d.classList.remove('filled'); });
    document.getElementById('totpValue').value = '';
    submitBtn.disabled = true;
  }

  // Allow Enter on step1 to advance
  document.getElementById('password').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') { e.preventDefault(); document.getElementById('btnNext').click(); }
  });
</script>
</body>
</html>
